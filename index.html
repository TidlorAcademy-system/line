<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>ลงทะเบียนใช้งาน Line Tidlor Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <main class="d-flex align-items-center h-100">
        <div class="container">
            <div class="row">
                <div class="col-12">
                   <h1 class="text-center fw-bold">ลงทะเบียนใช้งาน Line OA<br>Tidlor Academy</h1>

                    <form id="stripe-login" method="post" name="myForm" onsubmit="return false;">
                        <div class="form-group">
                            <label for="codeId">รหัสพนักงาน</label>
                            <div id="codeIdHelp" class="d-inline text-danger form-text">*พนักงานประจำเปลี่ยน CF เป็น 10*</div>
                            <input type="text" class="form-control" aria-describedby="codeIdHelp" id="codeId" name="codeId" maxlength="8" placeholder="กรุณากรอกรหัสพนักงาน 8 ตัวอักษร">
                        </div>

                        <div class="form-group mt-3">
                            <label for="nameEn">ชื่อภาษาอังกฤษ</label>
                            <input type="text" class="form-control" id="nameEn" name="nameEn" placeholder="กรุณากรอกชื่อภาษาอังกฤษเท่านั้น">
                        </div>

                        <div class="text-center">
                            <input type="button" id="btn" value="บันทึกข้อมูล" class="btn w-100 mt-4">
                            <p id="loading-text" style="display: none; margin-top: 10px;">รอสักครู่ ระบบกำลังทำการบันทึกข้อมูลของคุณ...</p>
                        </div>
                    </form>

                    <div id="success-message" style="display: none; text-align: center; margin-top: 20px;">
                      <h4>ลงทะเบียนสำเร็จ</h4>
                      <p class="mb-0">ขอบคุณค่ะ</p>
                   </div>
                </div>
            </div>
        </div>
    </main>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const liffId = '2007338293-mtt52NDI';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxax5itXp1gwKKnPNhygEgVr2pxoUJgITOnqTOWHCA6ic4JPH-HNmO9XzH57I0-kVXvRA/exec';
        let userId = '';

        async function main() {
            try {
                await liff.init({ liffId });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                const profile = await liff.getProfile();
                userId = profile.userId;
                console.log('Profile:', profile);

                const form = document.forms['myForm'];
                const submitButton = document.getElementById('btn');
                const loadingText = document.getElementById('loading-text');
                const successMessage = document.getElementById('success-message');

                submitButton.addEventListener('click', async () => {
                    console.log('Button clicked');

                    const codeId = form.codeId.value.trim();
                    const nameEn = form.nameEn.value.trim();

                    if (!userId || !codeId || !nameEn) {
                        alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");
                        return;
                    }

                    submitButton.disabled = true;
                    submitButton.style.display = 'none';
                    loadingText.style.display = 'block';

                    const payload = new URLSearchParams({
                        codeId: codeId,
                        nameEn: nameEn,
                        userId: userId
                    }).toString();

                    try {
                        const response = await fetch(scriptURL, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                            },
                            body: payload
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const text = await response.text();
                        console.log('GAS response raw:', text);

                        let res;
                        try {
                            res = JSON.parse(text);
                        } catch (e) {
                            res = { raw: text };
                        }

                        console.log('GAS response parsed:', res);

                        form.style.display = 'none';
                        loadingText.style.display = 'none';
                        successMessage.style.display = 'block';

                    } catch (err) {
                        console.error('Error!', err);
                        submitButton.disabled = false;
                        submitButton.style.display = 'inline-block';
                        loadingText.style.display = 'none';
                        alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");
                    }
                });

            } catch (err) {
                console.error('LIFF error:', err);
                alert('ไม่สามารถเปิด LIFF ได้');
            }
        }

        main();
    </script>
</body>
</html>
